name: Test Telegram

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Test Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MIRA_TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from brain.notify import send_message
          result = send_message('Mira test message - if you see this, Telegram is working!')
          print('Result:', result)
          "
