name: Wake Mira

on:
  workflow_dispatch:       # manual trigger only — experiment ended 2026-03-27

permissions:
  contents: write
  pull-requests: write

jobs:
  wake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wake Mira
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MIRA_ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MIRA_TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python mira.py

      - name: Commit memory
        run: |
          git config user.name "Mira"
          git config user.email "mira@noreply.github.com"
          git add memory/ logs/ index.html
          git diff --staged --quiet || git commit -m "Mira: daily memory + site $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
